# .goreleaser.yaml — cross-compiled release for b2bdbg
# Docs: https://goreleaser.com/customization/
version: 2

project_name: b2bdbg

before:
  hooks:
    - go mod tidy
    - go generate ./...

# ---------------------------------------------------------------------------
# Cross-compiled static binaries
# ---------------------------------------------------------------------------
builds:
  - id: b2bdbg
    binary: b2bdbg
    main: ./cmd/b2bdbg
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # Produces: linux/amd64, linux/arm64, darwin/amd64, darwin/arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath

# ---------------------------------------------------------------------------
# Release archives
# ---------------------------------------------------------------------------
archives:
  - id: b2bdbg
    ids: [b2bdbg]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - config.example.yaml

# ---------------------------------------------------------------------------
# Checksums
# ---------------------------------------------------------------------------
checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# ---------------------------------------------------------------------------
# Source tarball
# ---------------------------------------------------------------------------
source:
  enabled: true
  name_template: "{{ .ProjectName }}_{{ .Version }}_source"

# ---------------------------------------------------------------------------
# SBOM (CycloneDX, one per archive artifact)
# ---------------------------------------------------------------------------
sboms:
  - artifacts: archive
    args: ["$artifact", "--output", "cyclonedx-json=$document"]

# ---------------------------------------------------------------------------
# Docker images — per-arch builds + manifest list pushed to GHCR.
#
# We use the stable `dockers:` API (not the experimental `dockers_v2:`).
# Reason: dockers_v2 hands buildx an essentially empty build context, so a
# Dockerfile that does `COPY b2bdbg /b2bdbg` fails at "/b2bdbg: not found".
# The stable `dockers:` API runs one buildx build per (goos, goarch) and
# *automatically* copies that arch's pre-built binary into the build context
# root, which is exactly what Dockerfile.release expects.
#
# `docker_manifests:` below stitches the two per-arch images into a single
# multi-arch manifest list so `docker pull ghcr.io/b2bdbg/b2bdbg:VERSION`
# resolves to the right arch on each host.
# ---------------------------------------------------------------------------
dockers:
  - id: b2bdbg-amd64
    ids: [b2bdbg]
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.release
    use: buildx
    image_templates:
      - "ghcr.io/b2bdbg/b2bdbg:{{ .Version }}-amd64"
      - "ghcr.io/b2bdbg/b2bdbg:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=b2bdbg"
      - "--label=org.opencontainers.image.description=Reverse proxy that captures and debugs Telegram bot conversations"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/b2bdbg/b2bdbg"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

  - id: b2bdbg-arm64
    ids: [b2bdbg]
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.release
    use: buildx
    image_templates:
      - "ghcr.io/b2bdbg/b2bdbg:{{ .Version }}-arm64"
      - "ghcr.io/b2bdbg/b2bdbg:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=b2bdbg"
      - "--label=org.opencontainers.image.description=Reverse proxy that captures and debugs Telegram bot conversations"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/b2bdbg/b2bdbg"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

docker_manifests:
  - name_template: "ghcr.io/b2bdbg/b2bdbg:{{ .Version }}"
    image_templates:
      - "ghcr.io/b2bdbg/b2bdbg:{{ .Version }}-amd64"
      - "ghcr.io/b2bdbg/b2bdbg:{{ .Version }}-arm64"
  - name_template: "ghcr.io/b2bdbg/b2bdbg:latest"
    image_templates:
      - "ghcr.io/b2bdbg/b2bdbg:latest-amd64"
      - "ghcr.io/b2bdbg/b2bdbg:latest-arm64"

# ---------------------------------------------------------------------------
# GitHub release notes
# ---------------------------------------------------------------------------
release:
  github:
    owner: b2bdbg
    name: b2bdbg
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "Features"
      regexp: "^feat"
      order: 0
    - title: "Bug fixes"
      regexp: "^fix"
      order: 1
    - title: "Other"
      order: 999
