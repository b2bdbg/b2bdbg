name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  ci:
    name: build / test / lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Test
        # Timeout is 180s, not 60s: the support-team integration test runs the
        # full bot↔proxy↔mock-Telegram pipeline through real TCP listeners,
        # and under -race on a shared GitHub runner the HTTP scheduling can
        # stretch it close to a minute — well within healthy bounds, but the
        # earlier 60s alarm clipped it mid-HandleTask. Locally the same test
        # finishes in ~3.5s; 180s gives ~50× safety margin on slow runners
        # without masking a real hang (a real hang still trips it).
        run: go test -race -timeout 180s ./...

      - name: Build
        run: |
          go build -ldflags "-X main.version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" \
            -o bin/b2bdbg ./cmd/b2bdbg

      - name: Docker build smoke
        # Validates the Dockerfile builds successfully on every CI run.
        # No push — this is purely a build smoke test.
        run: |
          docker build \
            --build-arg VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev) \
            --build-arg COMMIT=$(git rev-parse --short HEAD) \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t b2bdbg:ci-smoke \
            .
