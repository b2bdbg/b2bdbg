name: CI

on:
  push:
    branches: ["master"]
  pull_request:

# Opt JS actions into Node 24 now. GitHub-hosted runners will force this
# default on 2026-06-02 and remove Node 20 on 2026-09-16; setting the flag
# pre-emptively silences the deprecation warning and de-risks the cutover.
# Remove this once every JS action used below ships a Node 24 build natively.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    name: build / test / lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Test
        # CI runs the core suite under -race -short. -short skips the
        # examples/support-team demo integration tests, which exercise example
        # code (a sloppy reply-matching demo RouterBot) rather than the
        # production proxy/capture/telemetry core. Those demo tests flake under
        # heavy -race scheduling on shared GitHub runners; they remain runnable
        # locally with `go test ./examples/support-team/...` (no -short) and
        # the real release gates are: this core suite, `make compose-smoke`
        # (full Docker stack), and `make test-telegram` (opt-in real Telegram).
        run: go test -race -short -timeout 180s ./...

      - name: Build
        run: |
          go build -ldflags "-X main.version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)" \
            -o bin/b2bdbg ./cmd/b2bdbg

      - name: Docker build smoke
        # Validates the Dockerfile builds successfully on every CI run.
        # No push — this is purely a build smoke test.
        run: |
          docker build \
            --build-arg VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev) \
            --build-arg COMMIT=$(git rev-parse --short HEAD) \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t b2bdbg:ci-smoke \
            .
