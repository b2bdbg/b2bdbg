name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub release + upload assets
  packages: write   # push to GHCR

# Opt JS actions into Node 24 now. GitHub-hosted runners will force this
# default on 2026-06-02 and remove Node 20 on 2026-09-16; setting the flag
# pre-emptively silences the deprecation warning and de-risks the cutover.
# Remove this once every JS action used below ships a Node 24 build natively.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history required for changelog generation.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Set up QEMU (multi-arch Docker builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft (for SBOM generation by goreleaser)
        # goreleaser invokes `syft` to produce a Software Bill of Materials
        # for each release artifact. The GitHub-hosted ubuntu-latest runner
        # does NOT ship syft, so the goreleaser run fails at the SBOM step
        # unless syft is installed up front. anchore/sbom-action publishes a
        # tiny download-only sub-action that drops the syft binary into PATH
        # without running it — exactly what goreleaser then shells out to.
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
